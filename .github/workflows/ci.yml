name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
      with:
        submodules: recursive

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake build-essential pkg-config libglib2.0-dev \
          libgtk-3-dev libsndfile1-dev libasound2-dev libjack-jackd2-dev \
          libfftw3-dev libsamplerate0-dev libsuil-dev liblo-dev liblilv-dev \
          libserd-dev libsord-dev libsratom-dev libpcre2-dev python3 python3-pip

    - name: Run Build Script
      run: |
        chmod +x build.sh
        ./build.sh
